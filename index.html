<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Strategy Encyclopedia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fb;color:#111;font-size:14px;min-height:100vh}

/* ── DESKTOP LAYOUT (≥ 768px) ── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;background:#f8f9fb}
.mobile-header{display:none}
.mobile-back-btn{display:none}

/* ── MOBILE LAYOUT (< 768px) ── */
@media(max-width:767px){
  .shell{flex-direction:column;height:100vh;overflow:hidden}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:none;height:100%;display:flex;flex-direction:column}
  .sidebar.hidden{display:none}
  .content{flex:1;overflow-y:auto;display:none}
  .content.visible{display:block}
  .mobile-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:50}
  .mobile-back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:#2563eb;font-weight:600;cursor:pointer;padding:0}
  .mobile-header-title{font-size:14px;font-weight:700;color:#1a1a2e;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .detail-pane{padding:16px 14px 80px}
  .cards-row{grid-template-columns:1fr}
  .fin-row{grid-template-columns:1fr}
}

/* ── SIDEBAR TOP ── */
.sb-top{padding:16px 16px 12px;border-bottom:1px solid #e5e7eb}
.sb-logo{font-size:13px;font-weight:700;color:#1a1a2e;letter-spacing:-.01em;margin-bottom:10px}
.sb-logo span{color:#2563eb}
.sb-logo-sub{font-size:11px;color:#9ca3af;font-weight:400;margin-top:1px}
.sb-search{position:relative}
.sb-search input{width:100%;padding:8px 10px 8px 30px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;background:#f8f9fb;color:#111;outline:none;transition:border-color .15s}
.sb-search input:focus{border-color:#2563eb;background:#fff}
.sb-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:#9ca3af;pointer-events:none}
.dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;z-index:100;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.dd.open{display:block}
.dd-row{padding:8px 12px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:8px}
.dd-row:last-child{border-bottom:none}
.dd-row:hover,.dd-row:active{background:#f8f9fb}
.dd-name{font-weight:600;flex:1}
.dd-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}

/* ── CAT TABS ── */
.sb-cats{padding:10px 8px 8px;border-bottom:1px solid #e5e7eb;display:flex;flex-wrap:wrap;gap:4px}
.cat-chip{padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .15s;white-space:nowrap;user-select:none}
.cat-chip:hover{border-color:#9ca3af;color:#374151}
.cat-chip.active{color:#fff;border-color:transparent}
.cat-chip[data-c="all"].active{background:#1a1a2e}
.cat-chip[data-c="bullish"].active{background:#059669}
.cat-chip[data-c="bearish"].active{background:#dc2626}
.cat-chip[data-c="neutral"].active{background:#2563eb}
.cat-chip[data-c="volatility"].active{background:#7c3aed}
.cat-chip[data-c="income"].active{background:#d97706}
.cat-chip[data-c="greek"].active{background:#0891b2}
.cat-chip[data-c="exotic"].active{background:#9d174d}

/* ── STRATEGY LIST ── */
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:#e5e7eb}
.sb-group-label{padding:10px 16px 4px;font-size:10.5px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em}
.sb-item{padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:#f8f9fb}
.sb-item.active{background:#eff6ff;border-left-color:#2563eb}
.sb-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:500;line-height:1.2}
.sb-item-sub{font-size:11px;color:#9ca3af;margin-top:1px}
.sb-item-tag{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.sb-count{font-size:11px;color:#9ca3af;padding:8px 16px 4px;border-top:1px solid #f3f4f6;margin-top:4px}

/* ── EMPTY PANE ── */
.empty-pane{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#9ca3af;text-align:center;padding:40px}
.empty-pane-icon{width:48px;height:48px;border-radius:12px;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:4px}
.empty-pane-title{font-size:15px;font-weight:600;color:#6b7280}
.empty-pane-sub{font-size:13px;line-height:1.6;max-width:260px}

/* ── DETAIL PANE ── */
.detail-pane{padding:32px 40px;max-width:820px}
.d-header{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #e5e7eb}
.d-crumbs{display:flex;align-items:center;gap:6px;font-size:12px;color:#9ca3af;margin-bottom:12px}
.d-crumb-sep{color:#d1d5db}
.d-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:8px;line-height:1.2}
.d-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.d-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em}
.d-view{font-size:13.5px;color:#374151;line-height:1.6;max-width:620px}
.sec-title{font-size:10.5px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.ic-label{font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.ic-val{font-size:13.5px;color:#1a1a2e;line-height:1.5;font-weight:500}

/* ── FINANCIALS ── */
.fin-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.fin-box{border-radius:10px;padding:14px 16px;border:1px solid}
.fin-box.profit{background:#f0fdf4;border-color:#bbf7d0}
.fin-box.loss{background:#fff1f2;border-color:#fecdd3}
.fin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.fin-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.fin-box.profit .fin-title{color:#059669}
.fin-box.loss .fin-title{color:#dc2626}
.fin-amount{font-size:15px;font-weight:700;margin-bottom:4px}
.fin-box.profit .fin-amount{color:#059669}
.fin-box.loss .fin-amount{color:#dc2626}
.fin-dir-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;margin-bottom:5px}
.fin-box.profit .fin-dir-pill{background:#dcfce7;color:#15803d}
.fin-box.loss .fin-dir-pill{background:#ffe4e6;color:#b91c1c}
.fin-note{font-size:12px;color:#6b7280;line-height:1.4}
.fin-unlim{font-size:10px;font-weight:700;background:#dbeafe;color:#1d4ed8;padding:2px 7px;border-radius:4px}
.be-band{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:9px 14px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.be-item{display:flex;align-items:center;gap:6px;font-size:12.5px}
.be-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex-shrink:0}
.be-label{color:#6b7280}
.be-val{font-weight:700;color:#1a1a2e}

/* ── MARGIN ── */
.margin-block{border-radius:10px;padding:14px 16px;border:1px solid;margin-bottom:20px}
.margin-block.low{background:#f0fdf4;border-color:#bbf7d0}
.margin-block.med{background:#fffbeb;border-color:#fde68a}
.margin-block.high{background:#fff1f2;border-color:#fecdd3}
.margin-top-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.margin-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.margin-badge.low{background:#dcfce7;color:#15803d}
.margin-badge.med{background:#fef3c7;color:#92400e}
.margin-badge.high{background:#ffe4e6;color:#b91c1c}
.margin-req{font-size:13.5px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.margin-note{font-size:12.5px;color:#6b7280;line-height:1.5}

/* ── P&L BAR ── */
.plbar-wrap{margin-bottom:20px}
.plbar-track{position:relative;height:28px;border-radius:6px;overflow:hidden;background:#f1f5f9;border:1px solid #e5e7eb;margin-bottom:24px}
.bz{position:absolute;top:0;bottom:0}
.bz-win{background:rgba(5,150,105,.12)}
.bz-loss{background:rgba(220,38,38,.1)}
.plbar-marker{position:absolute;top:-2px;bottom:-2px;width:2px;z-index:5}
.plbar-marker.spot{background:#2563eb}
.plbar-marker.be{background:#9ca3af;opacity:.8}
.plbar-mlabel{position:absolute;font-size:10.5px;font-weight:700;white-space:nowrap;top:-18px;left:50%;transform:translateX(-50%)}
.plbar-mlabel.spot{color:#2563eb}
.plbar-mlabel-bot{position:absolute;font-size:10px;white-space:nowrap;bottom:-17px;left:50%;transform:translateX(-50%);color:#9ca3af}
.plbar-axis{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-top:4px}
.plbar-legend{display:flex;gap:14px;margin-top:8px}
.pl-leg{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#6b7280}
.pl-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── CASES ── */
.cases{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.case-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:9px;border:1px solid}
.case-row.win{background:#f0fdf4;border-color:#bbf7d0}
.case-row.lose{background:#fff1f2;border-color:#fecdd3}
.case-row.neutral-c{background:#f8f9fb;border-color:#e5e7eb}
.case-ico{font-size:14px;margin-top:1px;flex-shrink:0;line-height:1}
.case-price{font-size:11.5px;color:#6b7280;margin-bottom:2px;font-weight:600}
.case-result{font-size:13.5px;font-weight:700;margin-bottom:2px}
.case-row.win .case-result{color:#059669}
.case-row.lose .case-result{color:#dc2626}
.case-row.neutral-c .case-result{color:#2563eb}
.case-desc{font-size:12px;color:#6b7280;line-height:1.4}

/* ── KEYWORDS ── */
.kw-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.kw{font-size:11px;background:#f1f5f9;border:1px solid #e5e7eb;color:#6b7280;padding:2px 7px;border-radius:4px}

/* ── COLOR HELPERS ── */
.col-bullish{color:#059669}.col-bearish{color:#dc2626}.col-neutral{color:#2563eb}
.col-volatility{color:#7c3aed}.col-income{color:#d97706}.col-greek{color:#0891b2}.col-exotic{color:#9d174d}
.dot-bullish{background:#059669}.dot-bearish{background:#dc2626}.dot-neutral{background:#2563eb}
.dot-volatility{background:#7c3aed}.dot-income{background:#d97706}.dot-greek{background:#0891b2}.dot-exotic{background:#9d174d}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
</style>
</head>
<body>
<div class="shell" id="shell">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">Options<span>Encyclopedia</span>
        <div class="sb-logo-sub">US Equity Listed Options · OCC Cleared</div>
      </div>
      <div class="sb-search">
        <span class="sb-search-ico">⌕</span>
        <input id="searchInput" type="text" placeholder="Search: naked, vega, credit…" autocomplete="off">
        <div class="dd" id="dropDown"></div>
      </div>
    </div>
    <div class="sb-cats" id="catBar"></div>
    <div class="sb-list" id="stratList"></div>
  </div>

  <!-- ── CONTENT ── -->
  <div class="content" id="contentArea">
    <div class="empty-pane">
      <div class="empty-pane-icon">📖</div>
      <div class="empty-pane-title">Select a strategy</div>
      <div class="empty-pane-sub">Choose from the sidebar, or search by name, keyword or style — e.g. "naked", "credit", "vega", "iron"</div>
    </div>
  </div>

</div>

const CAT={all:{label:"All",dot:"#6b7280"},bullish:{label:"Bullish",dot:"#059669"},bearish:{label:"Bearish",dot:"#dc2626"},neutral:{label:"Neutral",dot:"#2563eb"},volatility:{label:"Volatility",dot:"#7c3aed"},income:{label:"Income",dot:"#d97706"},greek:{label:"Greek",dot:"#0891b2"},exotic:{label:"Exotic",dot:"#9d174d"}};
const BC={debit:{bg:"#eff6ff",c:"#1d4ed8"},credit:{bg:"#f0fdf4",c:"#15803d"},variable:{bg:"#f5f3ff",c:"#6d28d9"}};

let activeCat="all",activeStrat=null,searchQ="";
const isMobile=()=>window.innerWidth<768;

function buildCatBar(){
  document.getElementById("catBar").innerHTML=Object.entries(CAT).map(([k,v])=>
    `<div class="cat-chip${activeCat===k?" active":""}" data-c="${k}" onclick="setCat('${k}')">${v.label}</div>`).join("");
}
function setCat(c){activeCat=c;searchQ="";document.getElementById("searchInput").value="";buildCatBar();buildList();document.getElementById("dropDown").classList.remove("open")}

function visibleStrats(){
  let d=[...STRATS];
  if(activeCat!=="all")d=d.filter(s=>s.cat===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();d=d.filter(s=>s.name.toLowerCase().includes(q)||(s.kw&&s.kw.some(k=>k.toLowerCase().includes(q)))||s.action.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q));}
  return d;
}

function buildList(){
  const list=document.getElementById("stratList");
  const data=visibleStrats();
  if(!data.length){list.innerHTML=`<div style="padding:20px 16px;font-size:12.5px;color:#9ca3af;text-align:center">No strategies found</div>`;return;}
  const groups={};
  data.forEach(s=>{if(!groups[s.cat])groups[s.cat]=[];groups[s.cat].push(s)});
  let html="";
  Object.entries(groups).forEach(([cat,strats])=>{
    if(activeCat==="all")html+=`<div class="sb-group-label">${CAT[cat]?.label||cat}</div>`;
    strats.forEach(s=>{
      const bc=BC[s.action]||BC.variable;
      html+=`<div class="sb-item${activeStrat===s.name?" active":""}" onclick="showDetail('${s.name}')">
        <div class="sb-item-dot dot-${s.cat}"></div>
        <div style="flex:1;min-width:0">
          <div class="sb-item-name">${s.name}</div>
          <div class="sb-item-sub">${s.contractAction.split("—")[0].trim()}</div>
        </div>
        <span class="sb-item-tag" style="background:${bc.bg};color:${bc.c}">${s.action}</span>
      </div>`;
    });
  });
  html+=`<div class="sb-count">${data.length} strategies</div>`;
  list.innerHTML=html;
}

function buildPLBar(s){
  const[lo,hi]=[s.range[0],s.range[1]],rng=hi-lo;
  const pct=v=>((Math.max(lo,Math.min(hi,v))-lo)/rng*100).toFixed(2);
  let z="";
  (s.zones||[]).forEach(zn=>z+=`<div class="bz bz-${zn.z}" style="left:${pct(zn.f)}%;width:${(pct(zn.t)-pct(zn.f))}%"></div>`);
  z+=`<div class="plbar-marker spot" style="left:${pct(100)}%"><div class="plbar-mlabel spot">Spot $100</div></div>`;
  (s.bes||[]).forEach(be=>z+=`<div class="plbar-marker be" style="left:${pct(be.price)}%"><div class="plbar-mlabel-bot">${be.label} $${be.price}</div></div>`);
  const ax=[lo,lo+Math.round(rng*.25),lo+Math.round(rng*.5),lo+Math.round(rng*.75),hi];
  return`<div class="plbar-wrap">
    <div class="sec-title">P&L zone — AAPL price at expiry</div>
    <div class="plbar-track">${z}</div>
    <div class="plbar-axis">${ax.map(v=>`<span>$${v}</span>`).join("")}</div>
    <div class="plbar-legend">
      <div class="pl-leg"><div class="pl-leg-dot" style="background:rgba(5,150,105,.2);border:1px solid #059669"></div>Profit zone</div>
      <div class="pl-leg"><div class="pl-leg-dot" style="background:rgba(220,38,38,.12);border:1px solid #dc2626"></div>Loss zone</div>
    </div>
  </div>`;
}

function showDetail(name){
  const s=STRATS.find(x=>x.name===name);if(!s)return;
  activeStrat=name;buildList();
  const bc=BC[s.action]||BC.variable;

  const finHTML=`<div class="sec-title">Financials</div>
    <div class="fin-row">
      <div class="fin-box profit">
        <div class="fin-header"><span class="fin-title">Max profit</span>${s.profitUnlim?`<span class="fin-unlim">Unlimited</span>`:""}</div>
        <div class="fin-amount">${s.profitAmt}</div>
        <span class="fin-dir-pill">${s.profitDir||""}</span>
        <div class="fin-note">${s.profitNote}</div>
      </div>
      <div class="fin-box loss">
        <div class="fin-header"><span class="fin-title">Max loss</span>${(s.lossAmt||"").toLowerCase().includes("unlimited")?`<span style="font-size:10px;font-weight:700;background:#ffe4e6;color:#b91c1c;padding:2px 7px;border-radius:4px">Unlimited</span>`:""}</div>
        <div class="fin-amount">${s.lossAmt}</div>
        <span class="fin-dir-pill">${s.lossDir||""}</span>
        <div class="fin-note">${s.lossNote}</div>
      </div>
    </div>
    ${(s.bes||[]).length?`<div class="be-band">${s.bes.map(be=>`<div class="be-item"><div class="be-dot"></div><span class="be-label">${be.label}:</span><span class="be-val">$${be.price}</span></div>`).join("")}</div>`:``}`;

  const marginHTML=`<div class="sec-title">Margin requirement</div>
    <div class="margin-block ${s.margin.lvl}">
      <div class="margin-top-row"><span class="margin-badge ${s.margin.lvl}">${s.margin.lvl==="low"?"Low / defined":s.margin.lvl==="med"?"Moderate":"High / naked"}</span></div>
      <div class="margin-req">${s.margin.req}</div>
      <div class="margin-note">${s.margin.note}</div>
    </div>`;

  const casesHTML=`<div class="sec-title">Example outcomes — AAPL · Spot $100 · Strike $100 · Premium $3</div>
    <div class="cases">${s.cases.map(c=>`<div class="case-row ${c.t}">
      <div class="case-ico">${c.t==="win"?"✅":c.t==="lose"?"❌":"⚖"}</div>
      <div><div class="case-price">AAPL at $${c.p}</div><div class="case-result">${c.r}</div><div class="case-desc">${c.d}</div></div>
    </div>`).join("")}</div>`;

  const detailHTML=`<div class="detail-pane">
    <div class="d-header">
      <div class="d-crumbs">
        <span>All strategies</span><span class="d-crumb-sep">›</span>
        <span class="col-${s.cat}" style="font-weight:600">${CAT[s.cat]?.label||s.cat}</span>
        <span class="d-crumb-sep">›</span><span style="color:#374151">${s.name}</span>
      </div>
      <div class="d-title">${s.name}</div>
      <div class="d-badges">
        <span class="d-badge" style="background:${bc.bg};color:${bc.c}">${s.action}</span>
        <span class="d-badge col-${s.cat}" style="background:#f8f9fb;border:1px solid #e5e7eb">${CAT[s.cat]?.label||s.cat}</span>
      </div>
      <div class="d-view">${s.view}</div>
      <div class="kw-wrap">${(s.kw||[]).map(k=>`<span class="kw">${k}</span>`).join("")}</div>
    </div>
    <div class="cards-row">
      <div class="info-card"><div class="ic-label">Contract action</div><div class="ic-val">${s.contractAction}</div></div>
      <div class="info-card"><div class="ic-label">Rights / obligation</div><div class="ic-val">${s.rights}</div></div>
    </div>
    ${finHTML}${marginHTML}${buildPLBar(s)}${casesHTML}
  </div>`;

  if(isMobile()){
    // Mobile: show content pane, hide sidebar, add header with back button
    document.getElementById("sidebar").classList.add("hidden");
    const ca=document.getElementById("contentArea");
    ca.classList.add("visible");
    ca.innerHTML=`
      <div class="mobile-header">
        <button class="mobile-back-btn" onclick="mobileBack()">← Back</button>
        <div class="mobile-header-title">${s.name}</div>
      </div>
      ${detailHTML}`;
    ca.scrollTop=0;
  } else {
    // Desktop: just update content area
    const ca=document.getElementById("contentArea");
    ca.innerHTML=detailHTML;
    ca.scrollTop=0;
  }
}

function mobileBack(){
  activeStrat=null;
  document.getElementById("sidebar").classList.remove("hidden");
  const ca=document.getElementById("contentArea");
  ca.classList.remove("visible");
  ca.innerHTML=`<div class="empty-pane">
    <div class="empty-pane-icon">📖</div>
    <div class="empty-pane-title">Select a strategy</div>
    <div class="empty-pane-sub">Choose from the list, or search by name or keyword</div>
  </div>`;
  buildList();
}

// Search
const inp=document.getElementById("searchInput");
const drop=document.getElementById("dropDown");
inp.addEventListener("input",function(){
  searchQ=this.value.trim();buildList();
  if(!searchQ){drop.classList.remove("open");return;}
  const q=searchQ.toLowerCase();
  const hits=STRATS.filter(s=>s.name.toLowerCase().includes(q)||(s.kw&&s.kw.some(k=>k.toLowerCase().includes(q)))||s.action.toLowerCase().includes(q)).slice(0,7);
  if(!hits.length){drop.classList.remove("open");return;}
  drop.innerHTML=hits.map(s=>{const bc=BC[s.action]||BC.variable;return`<div class="dd-row" onclick="showDetail('${s.name}');inp.value='';searchQ='';drop.classList.remove('open');buildList()">
    <div class="sb-item-dot dot-${s.cat}"></div>
    <div class="dd-name">${s.name}</div>
    <span class="dd-badge" style="background:${bc.bg};color:${bc.c}">${s.action}</span>
  </div>`;}).join("");
  drop.classList.add("open");
});
document.addEventListener("click",e=>{if(!e.target.closest(".sb-search"))drop.classList.remove("open")});

// Handle resize between mobile/desktop
window.addEventListener("resize",()=>{
  if(!isMobile()&&activeStrat){
    document.getElementById("sidebar").classList.remove("hidden");
    const ca=document.getElementById("contentArea");
    ca.classList.remove("visible");
    showDetail(activeStrat);
  }
});

buildCatBar();
buildList();
</script>
</body>
</html>
